<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lost cincinnati</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(47, 47, 47);
            color:#6b3e32fc;
            cursor: url("images/firee-cursor.ico"), default;   
        }

        
        h1 {
            text-align: center;
        }
        img {
            display: inline-block;
            max-height: 400px
        }
        #gallery-container {
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .image-wrapper img {
            max-height: 800px;
        }

        /* ONLY the top image should be absolute */
        .new-image {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.1s linear;
        }

        .old-image {
            display: block;
            z-index: 1;
        }
    </style>
    
</head>

<body>
    
    <style>
        .image-container {
            width: 100%;
        }
 
        .fill-width-image {
            width: 100%;
        }
    </style>
</head>
 

<br>
<br>

      <div id="gallery-container">
       

        <div class="image-wrapper">
            <img src="images/119-broadway-1920.png" class="old-image">
            <img src="images/119-broadway-CD.png" class="new-image ">

        </div>
        
        <script>
const wrappers = document.querySelectorAll(".image-wrapper");

wrappers.forEach(wrapper => {
    const newImg = wrapper.querySelector(".new-image");

    wrapper.addEventListener("mousemove", (e) => {
        const rect = wrapper.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const width = rect.width;

        // value between 0 (left) and 1 (right)
        const percent = x / width;

        newImg.style.opacity = percent;
    });

    // Optional: reset when mouse leaves
    wrapper.addEventListener("mouseleave", () => {
        newImg.style.opacity = 0;
    });
});
</script>
