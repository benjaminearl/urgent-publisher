<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Sounds Hover Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
            display: flex;
        }
        .container {
            position: relative;
        }
        button {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 5px solid #0033ff;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover ;
            background-color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            border-radius: 8px;
            font-size: 0;
            transition: transform 0.1s;

            
        }
        button:hover {
            background-color: rgba(200, 200, 255, 0.9);
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    <script>
        let animals = [
            { image: 'images/Frog.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/dog-bark-1.wav', playing: false, button: null },
            { image: 'images/Cuckoo.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/cat-meow-1.wav', playing: false, button: null },
            { image: 'images/Ants.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/mouse-squeak-1.wav', playing: false, button: null },
            { image: 'images/Dragonflies.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/cow-moo-1.wav', playing: false, button: null },
            { image: 'images/Bees.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/pig-oink-1.wav', playing: false, button: null },
            { image: 'images/Swallows.jpg', soundUrl: 'https://www.soundjay.com/misc/sounds/frog-croak-1.wav', playing: false, button: null }
        ];
        let allPlaying = false;
        let crashStart = 0;
        let canvasElement;

        function setup() {
            canvasElement = createCanvas(700, 500);
            canvasElement.parent('container');

            // Create image buttons in a 3x2 grid
            let cols = 3;
            let buttonWidth = 300;
            let buttonHeight = 300;
            let startX = 50;
            let startY = 50;
            let spacingX = 0;
            let spacingY = 0;

            for (let i = 0; i < animals.length; i++) {
                let col = i % cols;
                let row = Math.floor(i / cols);
                let x = startX + col * spacingX;
                let y = startY + row * spacingY;

                let btn = createButton('');
                btn.position(x, y);
                btn.size(buttonWidth, buttonHeight);
                btn.style('background-image', 'url(' + animals[i].image + ')');
                
                // Capture animal reference in closure
                (function(animal) {
                    btn.mouseOver(() => playAnimalSound(animal));
                })(animals[i]);
                
                animals[i].button = btn;
            }
        }

        function playAnimalSound(animal) {
            if (!animal.playing && !allPlaying) {
                let audio = new Audio(animal.soundUrl);
                audio.play();
                animal.playing = true;
                checkAllPlaying();
            }
        }

        function checkAllPlaying() {
            allPlaying = animals.every(a => a.playing);
            if (allPlaying) {
                crashStart = millis();
            }
        }

        function draw() {
            background(255);

            if (allPlaying) {
                let elapsed = millis() - crashStart;
                
                if (elapsed < 5000) {
                    // Crash effect
                    background(random(255), random(255), random(255));
                    
                    stroke(random(255));
                    strokeWeight(random(2, 8));
                    for (let i = 0; i < 30; i++) {
                        line(random(width), random(height), random(width), random(height));
                    }
                    
                    noStroke();
                    fill(random(255), random(255), random(255), 150);
                    for (let i = 0; i < 15; i++) {
                        rect(random(width), random(height), random(50, 150), random(50, 150));
                    }
                    
                    fill(0);
                    textSize(80);
                    textAlign(CENTER, CENTER);
                    text('CRASH!', width / 2, height / 2);
                } else {
                    // After crash, freeze the screen
                    background(100);
                    fill(255);
                    textSize(40);
                    textAlign(CENTER, CENTER);
                    text('GAME OVER', width / 2, height / 2 - 40);
                    textSize(24);
                    text('Click to Reset', width / 2, height / 2 + 40);
                }
            }
        }

        function mousePressed() {
            if (allPlaying && millis() - crashStart > 5000) {
                // Reset the game
                for (let animal of animals) {
                    animal.playing = false;
                }
                allPlaying = false;
                crashStart = 0;
            }
        }
    </script>
</body>
</html>
