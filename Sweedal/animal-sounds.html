<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Sounds Hover Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
        }
        button {
            position: static;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.9);
            image-rendering: pixelated;
            cursor: pointer;
            border-radius: 0;
            font-size: 0;
            transition: transform 0.1s;
        }
        button:hover {
            background-color: rgba(0, 0, 0, 0.3);
            transform: scale(0.98);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    <script>
        let animals = [
            { image: 'images/Frog.jpg', soundUrl: 'images/frog croaking.mp3', playing: false, button: null, color: 'red' },
            { image: 'images/Cuckoo.jpg', soundUrl: 'images/cuckoo calling.mp3', playing: false, button: null, color: 'blue' },
            { image: 'images/Ants.jpg', soundUrl: 'images/ants buzzing.mp3', playing: false, button: null, color: 'green' },
            { image: 'images/Dragonflies.jpg', soundUrl: 'images/dragonflies hummming.mp3', playing: false, button: null, color: 'red' },
            { image: 'images/Bees.jpg', soundUrl: 'images/bees buzzing.mp3', playing: false, button: null, color: 'blue'},
            { image: 'images/Swallows.jpg', soundUrl: 'images/swallows chirping.mp3', playing: false, button: null, color: 'green' },
            { image: 'images/Cattle.jpg', soundUrl: 'images/cattle mooing.mp3', playing: false, button: null, color: 'red' },
            { image: 'images/Grasshopper.jpg', soundUrl: 'images/grasshopper chirping.mp3', playing: false, button: null, color: 'blue' },
            { image: 'images/Peacock.jpg', soundUrl: 'images/peacock crowing.mp3', playing: false, button: null, color: 'green' }
        ];
        let allPlaying = false;
        let crashStart = 0;
        let canvasElement = null;

        function setup() {
            // Create canvas behind everything
            let cnv = createCanvas(window.innerWidth, window.innerHeight);
            cnv.position(0, 0);
            cnv.style('position', 'fixed');
            cnv.style('top', '0');
            cnv.style('left', '0');
            cnv.style('z-index', '-1');  // Behind buttons
            
            // Create image buttons in a 3x3 grid that fills the screen
            let cols = 3;
            let rows = 3;
            let containerWidth = window.innerWidth;
            let containerHeight = window.innerHeight;
            let buttonWidth = containerWidth / cols;
            let buttonHeight = containerHeight / rows;

            for (let i = 0; i < animals.length; i++) {
                let col = i % cols;
                let row = Math.floor(i / cols);
                let x = col * buttonWidth;
                let y = row * buttonHeight;

                let btn = createButton('');
                btn.position(x, y);
                btn.size(buttonWidth, buttonHeight);
                btn.style('background-image', 'url(' + animals[i].image + ')');
                
                // Capture animal reference in closure
                (function(animal) {
                    btn.mousePressed(() => playAnimalSound(animal));
                })(animals[i]);
                
                animals[i].button = btn;
            }
        }

        function playAnimalSound(animal) {
            if (!animal.playing && !allPlaying) {
                console.log('Playing:', animal.soundUrl);
                let audio = new Audio(animal.soundUrl);
                audio.play().catch(err => console.log('Error:', err));
                animal.playing = true;
                checkAllPlaying();
            }
        }

        function checkAllPlaying() {
            allPlaying = animals.every(a => a.playing);
            if (allPlaying) {
                crashStart = millis();
            }
        }

        function draw(){
            if (allPlaying) {
                let elapsedTime = millis() - crashStart;  // How long since crash started
                
                // PHASE 1: First 1000ms - show colored buttons (remove image, show color)
                if (elapsedTime < 1000) {
                    for (let animal of animals) {
                        if (animal.button) {
                            animal.button.style('background-image', 'none');  // Hide image
                            animal.button.style('background-color', animal.color);  // Show color
                        }
                    }
                }
                
                // PHASE 2: After 1000ms - go black and hide buttons
                if (elapsedTime >= 1000) {
                    background(0);  // Black background
                    fill(255);
                    textSize(80);
                    textAlign(CENTER, CENTER);
                    text('SYSTEM CRASH', width/2, height/2);
                    
                    for (let animal of animals) {
                        if (animal.button) {
                            animal.button.hide();
                        }
                    }
                }
            } else {
                // Show all buttons when not crashed (restore images)
                for (let animal of animals) {
                    if (animal.button) {
                        animal.button.style('background-image', 'url(' + animal.image + ')');
                        animal.button.show();
                    }
                }
            }
        }
                // Show all buttons when not crashed
                for (let animal of animals) {
                    if (animal.button) {
                        animal.button.show();
                    }
                }
        function draw(){
            if (allPlaying) {
                // STEP 1: Change all button colors first
                for (let animal of animals) {
                    if (animal.button) {
                        animal.button.style('background-color', animal.color);
                        animal.button.hide();
                    }
                }
                
                // STEP 2: Show black background and crash text
                background(0);
                fill(255);
                textSize(80);
                textAlign(CENTER, CENTER);
                text('SYSTEM CRASH', width/2, height/2);
            } else {
                // Show all buttons when not crashed
                for (let animal of animals) {
                    if (animal.button) {
                        animal.button.show();
                    }
                }
            }
        }

        function mousePressed() {
            // Only reset if we're crashed and 2 second has passed
            if (allPlaying && millis() - crashStart > 1000) {
                // Reset all animals
                for (let animal of animals) {
                    animal.playing = false;
                }
                allPlaying = false;
                crashStart = 0;
                return false;  // Prevent default behavior
            }
        }
    </script>
</body>
</html>
