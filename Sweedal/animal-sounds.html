<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Sounds Hover Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
        }
        button {
            position: static;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.9);
            image-rendering: pixelated;
            cursor: pointer;
            border-radius: 0;
            font-size: 0;
            transition: transform 0.1s;
        }
        button:hover {
            background-color: rgba(0, 0, 0, 0.3);
            transform: scale(0.98);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    <script>
        let animals = [
            { image: 'images/Frog.jpg', soundUrl: 'images/frog croaking.mp3', playing: false, button: null },
            { image: 'images/Cuckoo.jpg', soundUrl: 'images/cuckoo calling.mp3', playing: false, button: null },
            { image: 'images/Ants.jpg', soundUrl: 'images/ants buzzing.mp3', playing: false, button: null },
            { image: 'images/Dragonflies.jpg', soundUrl: 'images/dragonflies hummming.mp3', playing: false, button: null },
            { image: 'images/Bees.jpg', soundUrl: 'images/bees buzzing.mp3', playing: false, button: null },
            { image: 'images/Swallows.jpg', soundUrl: 'images/swallows chirping.mp3', playing: false, button: null },
            { image: 'images/Cattle.jpg', soundUrl: 'images/cattle mooing.mp3', playing: false, button: null },
            { image: 'images/Grasshopper.jpg', soundUrl: 'images/grasshopper chirping.mp3', playing: false, button: null },
            { image: 'images/Peacock.jpg', soundUrl: 'images/peacock crowing.mp3', playing: false, button: null }
        ];
        let allPlaying = false;
        let crashStart = 0;
        let canvasElement = null;

        function setup() {
            // Create image buttons in a 3x3 grid that fills the screen
            let cols = 3;
            let rows = 3;
            let containerWidth = window.innerWidth;
            let containerHeight = window.innerHeight;
            let buttonWidth = containerWidth / cols;
            let buttonHeight = containerHeight / rows;

            for (let i = 0; i < animals.length; i++) {
                let col = i % cols;
                let row = Math.floor(i / cols);
                let x = col * buttonWidth;
                let y = row * buttonHeight;

                let btn = createButton('');
                btn.position(x, y);
                btn.size(buttonWidth, buttonHeight);
                btn.style('background-image', 'url(' + animals[i].image + ')');
                
                // Capture animal reference in closure
                (function(animal) {
                    btn.mousePressed(() => playAnimalSound(animal));
                })(animals[i]);
                
                animals[i].button = btn;
            }
        }

        function playAnimalSound(animal) {
            if (!animal.playing && !allPlaying) {
                console.log('Playing:', animal.soundUrl);
                let audio = new Audio(animal.soundUrl);
                audio.crossOrigin = "anonymous";
                audio.play().catch(err => console.log('Error:', err));
                animal.playing = true;
                checkAllPlaying();
            }
        }

        function checkAllPlaying() {
            allPlaying = animals.every(a => a.playing);
            if (allPlaying) {
                crashStart = millis();
            }
        }

        function draw() {
            background(200);

            if (allPlaying) {
                let elapsed = millis() - crashStart;
                
                if (elapsed < 5000) {
                    // Crash effect
                    background(random(255), random(255), random(255));
                    
                    stroke(random(255));
                    strokeWeight(random(2, 8));
                    for (let i = 0; i < 30; i++) {
                        line(random(width), random(height), random(width), random(height));
                    }
                    
                    noStroke();
                    fill(random(255), random(255), random(255), 150);
                    for (let i = 0; i < 15; i++) {
                        rect(random(width), random(height), random(50, 150), random(50, 150));
                    }
                    
                    fill(0);
                    textSize(80);
                    textAlign(CENTER, CENTER);
                    text('CRASH!', width / 2, height / 2);
                } else {
                    // After crash, freeze the screen
                    background(100);
                    fill(255);
                    textSize(40);
                    textAlign(CENTER, CENTER);
                    text('GAME OVER', width / 2, height / 2 - 40);
                    textSize(24);
                    text('Click to Reset', width / 2, height / 2 + 40);
                }
            }
        }

        function mousePressed() {
            if (allPlaying && millis() - crashStart > 5000) {
                // Reset the game
                for (let animal of animals) {
                    animal.playing = false;
                }
                allPlaying = false;
                crashStart = 0;
            }
        }
    </script>
</body>
</html>
