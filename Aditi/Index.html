     🕒 Time remaining: <span id="timer"></span>
</div>


    
    <script>
        
      window.onload = function () {
    let timeLeft = 180; 
    const timerElement = document.getElementById("timer");

    let threeMinAlertShown = false;
    let oneMinAlertShown = false;

    const countdown = setInterval(function () {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        timerElement.textContent = `${minutes}:${seconds}`;

        
        if (timeLeft <= 60 && !threeMinAlertShown) {
            alert("alert: 1 minutes remaining!");
            threeMinAlertShown = true;
        }

       
        if (timeLeft <= 10 && !oneMinAlertShown) {
            alert("alert: last 10 seconds remaining!");
            oneMinAlertShown = true;
        }

       
        timeLeft--;

       
        if (timeLeft < 0) {
            alert("cycle complete — restarting timer");
            timeLeft = 180;
            threeMinAlertShown = false;
            oneMinAlertShown = false;
        }

    }, 1000);
}
