<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handmade Gallery Example</title>
    <style>
        h1 {
            text-align: center;
        }
        img {
            width: 40%;
            display: inline-block;
        }
        p {
            width: 40%;
            display: inline-block;
        }
        #gallery-container {
            width: 90%;
            margin: 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gallery-container">
        <h1>No, we won't back down</h1>
        <img src="images/protest-infiniti.gif" alt="drawings of protesters throughout time"> <!-- each of these images is stored in a folder called images thats in the same folder as the html document. They are currently in single column, but can also be arranged differently. These images could be exchanged for videos or gifs -->
        
    </div>
</body>
</html>
